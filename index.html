<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bloom</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }
    h1 {
      position: absolute;
      top: 20px;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      color: #f9c8d9;
      font-weight: 300;
      z-index: 10;
    }
    #container {
      position: relative;
      width: 640px;
      height: 480px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(249, 200, 217, 0.2);
    }
    video {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    /* Two canvases: one for hands (mirrored), one for tree (normal) */
    #canvasHands {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
    }
    #canvasTree {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #hud {
      position: absolute;
      top: 62px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 0.68rem;
      color: #f9c8d9;
      letter-spacing: 0.07em;
      z-index: 10;
      pointer-events: none;
    }
    #tip {
      position: absolute;
      bottom: 18px;
      font-size: 0.72rem;
      color: #ccc;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <h1>bloom</h1>
  <div id="hud">
    <span id="left-info">left: —</span>
    <span id="right-info">right: —</span>
  </div>
  <div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvasHands"></canvas>
    <canvas id="canvasTree"></canvas>
  </div>
  <p id="tip">✋ left hand: spread to grow · 🤚 right hand: spread to bloom</p>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script>
    const video = document.getElementById('video');
    const cH = document.getElementById('canvasHands');
    const cT = document.getElementById('canvasTree');
    const ctxH = cH.getContext('2d');
    const ctxT = cT.getContext('2d');
    const leftInfo = document.getElementById('left-info');
    const rightInfo = document.getElementById('right-info');

    const W = 640, H = 480;
    cH.width = cT.width = W;
    cH.height = cT.height = H;

    const TREE_X = W * 0.42;
    const TREE_Y = H + 5;
    const TREE_ANGLE = -(78 * Math.PI / 180);

    let treeSize = 0, bloomSize = 0;
    let smoothTree = 0, smoothBloom = 0;

    const CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],
      [0,17]
    ];
    const FINGERTIPS = [4, 8, 12, 16, 20];

    function px(lm, i) {
      return { x: lm[i].x * W, y: lm[i].y * H };
    }

    // ── Hand skeleton on canvasHands (already CSS-mirrored) ──
    function drawHand(landmarks, jointColor, tipColor) {
      CONNECTIONS.forEach(([a, b]) => {
        const pa = px(landmarks, a);
        const pb = px(landmarks, b);
        ctxH.beginPath();
        ctxH.moveTo(pa.x, pa.y);
        ctxH.lineTo(pb.x, pb.y);
        ctxH.strokeStyle = 'rgba(255,255,255,0.55)';
        ctxH.lineWidth = 2;
        ctxH.stroke();
      });

      landmarks.forEach((pt, i) => {
        const x = pt.x * W, y = pt.y * H;
        const isTip = FINGERTIPS.includes(i);
        // Glow
        ctxH.beginPath();
        ctxH.arc(x, y, isTip ? 14 : 7, 0, Math.PI * 2);
        ctxH.fillStyle = isTip
          ? tipColor.replace('1)', '0.18)')
          : 'rgba(255,255,255,0.08)';
        ctxH.fill();
        // Dot
        ctxH.beginPath();
        ctxH.arc(x, y, isTip ? 6 : 3.5, 0, Math.PI * 2);
        ctxH.fillStyle = isTip ? tipColor : jointColor;
        ctxH.fill();
      });

      // Pinch line between thumb(4) and index(8)
      const t = px(landmarks, 4);
      const idx = px(landmarks, 8);
      const d = Math.hypot(t.x - idx.x, t.y - idx.y);
      ctxH.beginPath();
      ctxH.setLineDash([5, 5]);
      ctxH.moveTo(t.x, t.y);
      ctxH.lineTo(idx.x, idx.y);
      ctxH.strokeStyle = tipColor.replace('1)', '0.8)');
      ctxH.lineWidth = 1.5;
      ctxH.stroke();
      ctxH.setLineDash([]);
      // Label
      const mx = (t.x + idx.x) / 2, my = (t.y + idx.y) / 2;
      ctxH.font = 'bold 11px monospace';
      ctxH.fillStyle = tipColor;
      ctxH.fillText(`${Math.round(d)}px`, mx + 6, my - 6);

      return d;
    }

    // ── Glowing branch on canvasTree ──
    function glowLine(x1, y1, x2, y2, w, color, glowColor) {
      // Glow pass
      ctxT.save();
      ctxT.shadowColor = glowColor;
      ctxT.shadowBlur = 18;
      ctxT.beginPath();
      ctxT.moveTo(x1, y1);
      ctxT.lineTo(x2, y2);
      ctxT.strokeStyle = glowColor;
      ctxT.lineWidth = w + 4;
      ctxT.lineCap = 'round';
      ctxT.stroke();
      ctxT.restore();
      // Core
      ctxT.beginPath();
      ctxT.moveTo(x1, y1);
      ctxT.lineTo(x2, y2);
      ctxT.strokeStyle = color;
      ctxT.lineWidth = w;
      ctxT.lineCap = 'round';
      ctxT.stroke();
    }

    // ── Lily flower ──
    function drawLily(x, y, size, bloom) {
      if (bloom < 0.03) return;
      const petals = 6;
      const pLen = size * bloom * 26;
      const pW = pLen * 0.26;

      for (let i = 0; i < petals; i++) {
        const angle = (i / petals) * Math.PI * 2;
        ctxT.save();
        ctxT.translate(x, y);
        ctxT.rotate(angle);

        // Glow halo
        ctxT.save();
        ctxT.shadowColor = 'rgba(255,120,180,0.6)';
        ctxT.shadowBlur = 14;
        ctxT.beginPath();
        ctxT.ellipse(0, -pLen * 0.5, pW, pLen * 0.5, 0, 0, Math.PI * 2);
        ctxT.fillStyle = `rgba(255,140,190,${bloom * 0.15})`;
        ctxT.fill();
        ctxT.restore();

        // Petal
        ctxT.beginPath();
        ctxT.ellipse(0, -pLen * 0.5, pW, pLen * 0.5, 0, 0, Math.PI * 2);
        const g = ctxT.createLinearGradient(0, 0, 0, -pLen);
        g.addColorStop(0,   `rgba(220, 60,130,${bloom * 0.95})`);
        g.addColorStop(0.5, `rgba(255,150,200,${bloom * 0.9})`);
        g.addColorStop(1,   `rgba(255,230,245,${bloom * 0.8})`);
        ctxT.fillStyle = g;
        ctxT.fill();

        // Vein
        ctxT.beginPath();
        ctxT.moveTo(0, -2);
        ctxT.lineTo(0, -pLen * 0.92);
        ctxT.strokeStyle = `rgba(255,200,230,${bloom * 0.55})`;
        ctxT.lineWidth = 0.8;
        ctxT.stroke();

        ctxT.restore();
      }

      // Stamen
      ctxT.save();
      ctxT.shadowColor = 'rgba(255,240,100,0.9)';
      ctxT.shadowBlur = 12;
      ctxT.beginPath();
      ctxT.arc(x, y, size * 3.5 * bloom, 0, Math.PI * 2);
      const cg = ctxT.createRadialGradient(x, y, 0, x, y, size * 3.5 * bloom);
      cg.addColorStop(0, `rgba(255,245,160,${bloom})`);
      cg.addColorStop(1, `rgba(255,180,60,${bloom * 0.7})`);
      ctxT.fillStyle = cg;
      ctxT.fill();
      ctxT.restore();
    }

    // ── Recursive tree: ONE trunk → splits into more each level ──
    function drawBranch(x1, y1, angle, length, depth, maxDepth, tips) {
      if (depth > maxDepth || length < 4) return;

      const x2 = x1 + Math.cos(angle) * length;
      const y2 = y1 + Math.sin(angle) * length;

      const t = depth / maxDepth;
      const bw = Math.max(1, (maxDepth - depth + 1) * 2.2);

      // Color: white-gold trunk → pink-magenta tips
      const r = Math.round(255);
      const g = Math.round(240 - t * 140);
      const b = Math.round(200 - t * 50);
      const a = 0.95 - t * 0.15;

      glowLine(
        x1, y1, x2, y2, bw,
        `rgba(${r},${g},${b},${a})`,
        `rgba(${r},${g - 30},${b + 30},${0.35 + smoothTree * 0.3})`
      );

      if (depth === maxDepth) {
        tips.push({ x: x2, y: y2, size: bw });
        return;
      }

      // Number of child branches increases per level
      // depth 0 → 1 branch (trunk), depth 1 → 2, depth 2 → 2, deeper → 2
      const numChildren = depth === 0 ? 1 : 2;
      const baseSpread = 0.42 + depth * 0.03;

      if (numChildren === 1) {
        // Trunk continues straight up
        drawBranch(x2, y2, angle, length * 0.72, depth + 1, maxDepth, tips);
      } else {
        drawBranch(x2, y2, angle - baseSpread, length * 0.68, depth + 1, maxDepth, tips);
        drawBranch(x2, y2, angle + baseSpread, length * 0.68, depth + 1, maxDepth, tips);
        // Extra middle branch on early splits for density
        if (depth <= maxDepth - 2) {
          drawBranch(x2, y2, angle + (Math.random() * 0.18 - 0.09), length * 0.55, depth + 2, maxDepth, tips);
        }
      }
    }

    function drawTree() {
      ctxT.clearRect(0, 0, W, H);
      if (smoothTree < 0.02) return;

      const maxDepth = Math.floor(1 + smoothTree * 5); // 1–6 levels
      const trunkLen = 35 + smoothTree * 170;

      const tips = [];
      drawBranch(TREE_X, TREE_Y, TREE_ANGLE, trunkLen, 0, maxDepth, tips);

      tips.forEach(tip => {
        drawLily(tip.x, tip.y, tip.size + smoothTree * 2, smoothBloom);
      });
    }

    function dist(lm, a, b) {
      return Math.hypot((lm[a].x - lm[b].x) * W, (lm[a].y - lm[b].y) * H);
    }

    function onResults(results) {
      ctxH.clearRect(0, 0, W, H);

      let leftFound = false, rightFound = false;

      if (results.multiHandLandmarks && results.multiHandedness) {
        results.multiHandedness.forEach((info, i) => {
          const lm = results.multiHandLandmarks[i];
          const isUserLeft  = info.label === 'Right'; // mirrored
          const isUserRight = info.label === 'Left';

          if (isUserLeft) {
            leftFound = true;
            const d = drawHand(lm, 'rgba(160,220,255,0.9)', 'rgba(100,200,255,1)');
            treeSize = Math.min(1, Math.max(0, (d - 18) / 185));
            leftInfo.textContent = `✋ pinch ${Math.round(d)}px · tree ${Math.round(treeSize*100)}%`;
          }

          if (isUserRight) {
            rightFound = true;
            const d = drawHand(lm, 'rgba(255,160,210,0.9)', 'rgba(255,100,180,1)');
            bloomSize = Math.min(1, Math.max(0, (d - 18) / 185));
            rightInfo.textContent = `🤚 pinch ${Math.round(d)}px · bloom ${Math.round(bloomSize*100)}%`;
          }
        });
      }

      if (!leftFound)  leftInfo.textContent  = 'left: not detected';
      if (!rightFound) rightInfo.textContent = 'right: not detected';

      smoothTree  += (treeSize  - smoothTree)  * 0.35;
      smoothBloom += (bloomSize - smoothBloom) * 0.08;

      drawTree();
    }

    const hands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    });
    hands.onResults(onResults);

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: W, height: H
    });
    camera.start();
  </script>
</body>
</html>
